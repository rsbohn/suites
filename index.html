<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suites</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0a0c0f;
      --panel: #111418;
      --border: #1e2530;
      --accent: #e8a020;
      --accent2: #20a0e8;
      --text: #c8d0d8;
      --dim: #5a6270;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Share Tech Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }
    .wrap {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    h1 {
      font-family: "Orbitron", ui-monospace, monospace;
      letter-spacing: 0.18em;
      color: var(--accent);
      margin-bottom: 16px;
      text-transform: uppercase;
    }
    p {
      color: var(--dim);
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    a.card {
      display: block;
      text-decoration: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      background: rgba(255,255,255,0.02);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    a.card:hover {
      border-color: var(--accent2);
      box-shadow: 0 0 20px rgba(32,160,232,0.2);
      transform: translateY(-2px);
    }
    .card .label {
      font-family: "Orbitron", ui-monospace, monospace;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: var(--accent2);
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .card .desc {
      font-size: 0.75rem;
      color: var(--dim);
      line-height: 1.5;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="wrap">
    <h1>Suites</h1>
    <p>Vibe-coded experiments. Pick a project:</p>
    <div class="grid">
      <a class="card" href="/quietfield/">
        <div class="label">Quietfield</div>
        <div class="desc">Ambient field interactions and calm UI experiments.</div>
      </a>
      <a class="card" href="/dustfall/">
        <div class="label">Dustfall</div>
        <div class="desc">Colony sim dashboard with events, resources, and map play.</div>
      </a>
      <a class="card" href="/sandy-acres/">
        <div class="label">Sandy Acres</div>
        <div class="desc">New single-page build in the sandy-acres suite.</div>
      </a>
    </div>
  </div>
</body>
</html>
